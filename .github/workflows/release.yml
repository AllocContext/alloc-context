name: release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check:
    if: github.repository == 'AllocContext/alloc-context'
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.decide.outputs.release }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Decide whether to release
        id: decide
        run: |
          set -euo pipefail
          VERSION=$(python3 scripts/bump_version.py --current)
          python3 scripts/bump_version.py --check "$VERSION"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "v${VERSION} already tagged — no release"
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "v${VERSION} has no tag — releasing"
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: check
    if: needs.check.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest -q

  publish-pypi:
    needs: [check, test]
    if: needs.check.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  finalize:
    needs: [check, publish-pypi]
    if: needs.check.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Tag and create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release ${VERSION}"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --verify-tag \
            --generate-notes
