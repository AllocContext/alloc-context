name: release-pr

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver increment (ignored when exact_version is set)
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      exact_version:
        description: Exact version (e.g. 0.2.0); overrides bump
        required: false
        type: string

concurrency:
  group: release-pr-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  open-release-pr:
    if: github.repository == 'AllocContext/alloc-context'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve release version
        id: bump
        env:
          EXACT_VERSION: ${{ inputs.exact_version }}
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          if [ -n "$EXACT_VERSION" ]; then
            VERSION=$(python3 scripts/bump_version.py "$EXACT_VERSION" --print)
          else
            VERSION=$(python3 scripts/bump_version.py --bump "$BUMP" --print)
          fi
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "Tag v${VERSION} already exists on remote"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Push release branch
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          BRANCH="release/v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --heads origin "${BRANCH}" | grep -q .; then
            echo "Remote branch ${BRANCH} already exists — reusing it"
            git fetch origin "${BRANCH}"
            git checkout -B "${BRANCH}" "origin/${BRANCH}"
            BRANCH_VER=$(python3 scripts/bump_version.py --current)
            if [ "${BRANCH_VER}" != "${VERSION}" ]; then
              echo "Branch ${BRANCH} is v${BRANCH_VER}, expected v${VERSION}"
              exit 1
            fi
          else
            git checkout -b "${BRANCH}"
            python3 scripts/bump_version.py "${VERSION}" --write
            git add pyproject.toml server.json alloccontext/__init__.py
            git commit -m "Bump version to ${VERSION}."
          fi
          git push -u origin "${BRANCH}"

      - name: Open release PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN || github.token }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          BRANCH="release/v${VERSION}"

          EXISTING_URL=$(gh pr list --repo "${GITHUB_REPOSITORY}" \
            --base main --head "${BRANCH}" --state open \
            --json url --jq '.[0].url // empty')
          if [ -n "${EXISTING_URL}" ]; then
            echo "Release PR already open: ${EXISTING_URL}"
            exit 0
          fi

          PR_OUTPUT=""
          if ! PR_OUTPUT=$(gh pr create --repo "${GITHUB_REPOSITORY}" \
            --base main --head "${BRANCH}" \
            --title "Release v${VERSION}" \
            --body "Automated version bump to ${VERSION}. Merging this PR to \`main\` tags \`v${VERSION}\` and runs the release (PyPI + MCP Registry)." \
            2>&1); then
            if echo "${PR_OUTPUT}" | grep -q createPullRequest; then
              echo "::error title=Actions cannot open release PRs::Enable **Allow GitHub Actions to create and approve pull requests** in repo Settings → Actions → General (https://github.com/${GITHUB_REPOSITORY}/settings/actions). For org repos, enable it on the org first: https://github.com/organizations/AllocContext/settings/actions. Alternative: add a \`RELEASE_PR_TOKEN\` repo secret (PAT with \`repo\` scope). Branch ${BRANCH} was pushed — open the PR manually if needed."
            else
              echo "::error::${PR_OUTPUT}"
            fi
            exit 1
          fi
          echo "Opened release PR: ${PR_OUTPUT}"
