# Bridge user config (legacy — optional)
#
# Self-host Cursor MCP does NOT need this file. Use mcp --config config/config.yaml
# and .env for ingest keys instead (see docs/cursor-mcp.md).
#
# Copy to ~/.config/alloc-context/user.yaml only for legacy bridge mode.
# Bridge upstream is retired — use mcp --config config/config.yaml instead.
# See docs/user-config.md (archive).
# self_host: true
# config: /absolute/path/to/alloc-context/config/config.yaml

exchanges:
  primary: coinbase   # or kraken
  coinbase:
    api_key: organizations/.../apiKeys/...
    api_secret: |
      -----BEGIN EC PRIVATE KEY-----
      ...
      -----END EC PRIVATE KEY-----
  # kraken:
  #   api_key: ...
  #   api_secret: ...

# Optional — enables allocation analysis when injected by bridge
# target_allocation:
#   BTC: 0.70
#   ETH: 0.30
#   CASH: 0.00
# band: 0.15

# Optional — local thesis entries for expectation_review (bridge inject)
# theses:
#   - id: zec-2026-06
#     recorded_at: "2026-06-01T00:00:00Z"
#     claims:
#       - type: RELATIVE_STRENGTH
#         asset: ZEC
#         benchmark: BTC
#       - type: REGIME_EXPECTATION
#         posture: RISK_ON
#         trajectory: STABLE   # optional

# x402 payer — legacy bridge only (upstream retired)
x402:
  payer_private_key_env: EVM_PRIVATE_KEY
  # payer_private_key_file: ~/.config/alloc-context/x402-payer.key
  # payer_private_key: "0x..."
